<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="80" fill="white"/>

  <!-- bold orbit rings -->
  <ellipse cx="256" cy="256" rx="210" ry="66" fill="none" stroke="#6D28D9" stroke-width="9"/>
  <ellipse cx="256" cy="256" rx="175" ry="54" fill="none" stroke="#0284C7" stroke-width="9" transform="rotate(45,256,256)"/>
  <ellipse cx="256" cy="256" rx="195" ry="58" fill="none" stroke="#059669" stroke-width="9" transform="rotate(90,256,256)"/>
  <ellipse cx="256" cy="256" rx="152" ry="46" fill="none" stroke="#C26104" stroke-width="7" transform="rotate(135,256,256)"/>

  <!-- electrons with white ring so they pop off orbits -->
  <circle cx="466" cy="256" r="18" fill="white"/>
  <circle cx="466" cy="256" r="15" fill="#6D28D9"/>

  <circle cx="46"  cy="256" r="15" fill="white"/>
  <circle cx="46"  cy="256" r="12" fill="#A78BFA"/>

  <circle cx="256" cy="61"  r="16" fill="white"/>
  <circle cx="256" cy="61"  r="13" fill="#059669"/>

  <circle cx="256" cy="451" r="13" fill="white"/>
  <circle cx="256" cy="451" r="10" fill="#34D399"/>

  <circle cx="380" cy="134" r="16" fill="white"/>
  <circle cx="380" cy="134" r="13" fill="#0284C7"/>

  <circle cx="140" cy="372" r="13" fill="white"/>
  <circle cx="140" cy="372" r="10" fill="#C26104"/>

  <!-- nucleus -->
  <circle cx="256" cy="256" r="52" fill="#6D28D9" opacity="0.15"/>
  <circle cx="256" cy="256" r="38" fill="#6D28D9" opacity="0.35"/>
  <circle cx="256" cy="256" r="26" fill="#7C3AED"/>
  <circle cx="256" cy="256" r="14" fill="#C4B5FD"/>
  <circle cx="256" cy="256" r="6"  fill="white"/>
</svg>
